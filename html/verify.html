<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AskSQL</title>

    <link
        rel="icon"
        type="image/svg+xml"
        href="../images/database-fill.svg"
    >

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <link
        rel="stylesheet"
        href="../css/verify.css"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="../css/global.css"
    >

</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div
        class="card p-4 text-center border-0"
        style="width:420px;"
    >

        <!-- ICON -->

        <div
            id="icon"
            class="icon-box mb-3"
        >

            <i class="bi bi-hourglass-split text-secondary"></i>

        </div>

        <!-- TITLE -->

        <h5 class="mb-2 fw-semibold">

            Email Verification

        </h5>

        <!-- MESSAGE -->

        <div
            id="message"
            class="alert alert-secondary mt-3"
        >

            Verifying your account...

        </div>

        <!-- LOGIN BUTTON -->

        <a
            id="loginButton"
            href="login.html"
            class="btn btn-primary w-100 mt-3 d-none"
        >

            <i class="bi bi-box-arrow-in-right me-2"></i>

            Go to Login

        </a>

    </div>

    <script src="../js/verify.js"></script>

</body>

</html>
