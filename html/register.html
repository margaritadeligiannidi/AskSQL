<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register | AskSQL</title>
    <link rel="icon" type="image/svg+xml" href="../images/database-fill.svg">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/global.css">  <!-- ADD THIS -->
    <link rel="stylesheet" href="../css/register.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="d-flex align-items-center justify-content-center vh-100"
   style="background: linear-gradient(135deg, #eef2ff, #f8fafc);">


    <div class="card shadow p-4 border-0" style="width: 370px; border-radius:15px;">

        <div class="text-center mb-3">
            <i class="bi bi-database-fill"
               style="font-size: 48px; color: #3b82f6;"></i>
        </div>

        <h4 class="text-center mb-4">Create an Account</h4>

        <div id="messageBox"></div>
           <br>

            <form id="registerForm">

                <!-- Username -->
                  <div class="mb-3 text-start">
                      <label class="form-label">Username
                        <span class="text-danger">*</span>
                      </label>

                      <div class="position-relative">
                          <i class="bi bi-person position-absolute"
                             style="top: 50%; transform: translateY(-50%); left: 12px; color:#6c757d;"></i>

                         <input class="form-control ps-5"
                           type="text"
                           name="username"
                           placeholder="Enter your username"
                           required>
                        </div>
                   </div>

                  <!-- Password -->
                    <div class="mb-3 text-start">
                        <label class="form-label">Password
                            <span class="text-danger">*</span>
                        </label>

                       <div class="position-relative">
                           <i class="bi bi-lock position-absolute"
                             style="top: 50%; transform: translateY(-50%); left: 12px; color:#6c757d;"></i>

                            <input type="password"
                               name="password"
                               class="form-control ps-5 pe-5 password-field"
                               placeholder="Enter your password"
                               required>

                              <i class="bi bi-eye-slash toggle-password"
                                 data-bs-toggle="tooltip"
                                 title="Show / hide password"
                                 style="position: absolute; top: 50%; right: 12px;
                                 transform: translateY(-50%);
                                 cursor: pointer; font-size: 18px; color: #6c757d;">
                              </i>
                        </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3 text-start">
            <label class="form-label">Confirm Password
                <span class="text-danger">*</span>
            </label>

            <div class="position-relative">
                <i class="bi bi-lock position-absolute"
                   style="top: 50%; transform: translateY(-50%); left: 12px; color:#6c757d;"></i>

                <input type="password"
                       name="password_2"
                       class="form-control ps-5 pe-5 password-field"
                       placeholder="Confirm your password"
                       required>

                      <i class="bi bi-eye-slash toggle-password"
                        data-bs-toggle="tooltip"
                        title="Show / hide password"
                        style="position: absolute; top: 50%; right: 12px;
                        transform: translateY(-50%);
                        cursor: pointer; font-size: 18px; color: #6c757d;">
                        </i>
             </div>
        </div>

        <!-- Email -->
        <div class="mb-3 text-start">
            <label class="form-label">Email
                <span class="text-danger">*</span>
            </label>

            <div class="position-relative">
                <i class="bi bi-envelope position-absolute"
                   style="top: 50%; transform: translateY(-50%); left: 12px; color:#6c757d;"></i>

                <input class="form-control ps-5"
                       type="email"
                       name="email"
                       placeholder="Enter your email"
                       required>
            </div>
        </div>

        <button class="btn btn-primary w-100 mt-2" type="submit" id="registerBtn">
            Register
        </button>

    </form>

    <div class="text-center mt-3">
        <p>
            Already have an account?
            <a href="login.html">Log in here</a>
        </p>
    </div>

</div>

<script src="../js/register.js"></script>

</body>
</html>
