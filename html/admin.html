<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | AskSQL</title>
    <link rel="icon" type="image/svg+xml" href="../images/database-fill.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
       <link rel="stylesheet" href="../css/navbar.css">  
   <link rel="stylesheet" href="../css/global.css"> 
    <link rel="stylesheet" href="../css/admin.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', redirectToLoginIfUnauthenticated);
    </script>

</head>

<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="admin.html">
            <span class="navbar-title">AskSQL Admin</span>
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">

            <div class="mobile-user-info d-lg-none">
                <i class="bi bi-person-fill"></i>

                <div class="user-meta">
                    <small>Signed in as</small>
                    <span id="navbarUsername">User</span>
                </div>
            </div>

            <div class="navbar-nav ms-auto">

                <a href="#"
                   onclick="logout()"
                   class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right me-1"></i>
                    Logout
                </a>

            </div>

        </div>

    </div>
</nav>



<!-- CONTAINER -->
<div class="container-fluid admin-container">

    <div class="admin-header">

        <h2>
            <i class="bi bi-people-fill me-2"></i>
            User Management
        </h2>

        <p>
            Manage user roles and permissions.
        </p>

    </div>

   <div class="row g-3 mb-4 align-items-center">

    <div class="col-lg-3">
        <div class="card stat-card p-3">
            <small>Total Users</small>
            <h3 id="totalUsers">0</h3>
        </div>
    </div>

    <div class="col-lg-9">
        <input
            type="text"
            id="searchUser"
            class="form-control"
            placeholder="Search username...">
    </div>

</div>
<div class="card p-0 bg-white">

    <div class="table-responsive">

        <table class="table table-hover mb-0 align-middle">

            <thead class="table-light">
                <tr>
                    <th><i class="bi bi-hash"></i> ID</th>
                    <th><i class="bi bi-person"></i> Username</th>
                    <th><i class="bi bi-person-badge"></i> Role</th>
                    <th><i class="bi bi-gear"></i> Change</th>
                </tr>
            </thead>

            <tbody id="usersTable">
                <!-- JS -->
            </tbody>

        </table>

    </div>

</div>

</div>

<!-- CHANGE ROLE MODAL -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
            <i class="bi bi-exclamation-triangle text-warning me-2"></i>
            Confirm Role Change
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="confirmText" class="mb-0"></p>
      </div>

      <div class="modal-footer">
      <button class="btn btn-danger" data-bs-dismiss="modal">
          <i class="bi bi-x-circle me-1"></i> Cancel
        </button>
        <button id="confirmBtn" class="btn btn-primary">
            <i class="bi bi-check-circle me-1"></i> Confirm
        </button>
      </div>

    </div>
  </div>
</div>

<script src="../js/admin.js"></script>

</body>
</html>
