<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New Connection | AskSQL</title>
    <link rel="icon" type="image/svg+xml" href="../images/database-fill.svg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  
    <link rel="stylesheet" href="../css/global.css">  
    <link rel="stylesheet" href="../css/new_connection.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', redirectToLoginIfUnauthenticated);
    </script>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR  -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

       <a class="navbar-brand d-flex align-items-center" href="#">
    <i class="bi bi-database-fill navbar-logo"></i>
    <span class="navbar-title">AskSQL</span>
</a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse justify-content-end"
             id="navbarMenu">

           <div class="mobile-user-info d-lg-none">
                <i class="bi bi-person-fill"></i>
               <div class="user-meta">
                 <small>Signed in as</small>
                 <span id="navbarUsername">User</span>
               </div>
            </div>

            <div class="navbar-nav align-items-lg-center gap-lg-3">

                <a href="connections.html"
                   class="nav-link text-light">
                    <i class="bi bi-arrow-left me-1"></i>
                    Connections
                </a>

                <a href="#"
                   onclick="logout()"
                   class="nav-link text-danger">

                    <i class="bi bi-box-arrow-right me-1"></i>
                    Logout

                </a>

            </div>

        </div>

    </div>
</nav>

<!-- CONTENT  -->
<div class="container mt-5 mb-5 connection-container">
      <div class="card p-4 border-0 bg-white">

            <h5 class="mb-1 text-center fw-semibold">New Database Connection</h5>
            <p class="text-center text-muted small mb-4">
                Create a new connection to your database
            </p>

           <div id="messageBox" class="mb-2"></div>

             <form id="connectForm">

              <!-- NAME + TYPE -->
                  <div class="row g-3">
                      <div class="col-md-6">
                          <label class="form-label">Name
                          <span class="text-danger">*</span>
                          </label>
                            <input class="form-control" 
                                    name="con_name" 
                                    placeholder="Connection name">
                       </div>

                       <div class="col-md-6">
                         <label class="form-label">Database Type</label>
                           <select class="form-select" name="type" id="dbType"
                               data-bs-toggle="tooltip"
                               title="Select database type (SSH = secure connection via server)">
                                 <option value="mysql">MySQL</option>
                                 <option value="mysql_ssh">MySQL SSH</option>
                                 <option value="pgsql">PostgreSQL</option>
                                 <option value="pgsql_ssh">PostgreSQL SSH</option>
                             </select>
                         </div>
                  </div>

<!-- HOST + PORT -->
<div class="row g-3 mt-1">
    <div class="col-md-8">
        <label class="form-label">Host
        <span class="text-danger">*</span> 
        </label>
           <input class="form-control"
               name="host"
               placeholder="e.g. localhost"
              data-bs-toggle="tooltip"
              title="Server address (localhost or IP)">
    </div>

    <div class="col-md-4">
        <label class="form-label">Port
        <span class="text-danger">*</span>
        </label>
          <input class="form-control"
               name="port"
               id="dbPort"
               placeholder="3306"
               data-bs-toggle="tooltip"
               title="Default: MySQL=3306, PostgreSQL=5432">
    </div>
</div>

<!-- USER + PASSWORD -->
<div class="row g-3 mt-1">
    <div class="col-md-6">
        <label class="form-label">User
        <span class="text-danger">*</span>
        </label>
        <input class="form-control" 
               name="username" 
               placeholder="e.g. root">
    </div>

    <div class="col-md-6">
        <label class="form-label">Password </label>

        <div class="position-relative">
            <input type="password"
                   name="password"
                   class="form-control pe-5 password-field"
                   placeholder="Database password"
                   >

            <i class="bi bi-eye-slash toggle-password"
               style="position:absolute; top:50%; right:12px; transform:translateY(-50%); cursor:pointer;">
            </i>
        </div>
    </div>
</div>

<!-- DATABASE --> 
<div class="mt-3">
    <label class="form-label" id="databaseLabel">Database</label>
    <input class="form-control" 
           name="database" 
           placeholder="Database name">
</div>  

<!-- SSH -->
<div id="sshFields" class="mt-4 border-top pt-3" style="display:none;">
    <h6 class="text-muted mb-3">SSH Settings</h6>

    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">SSH Host
            <span class="text-danger">*</span>
            </label>
            <input class="form-control" 
                   name="ssh_host"
                   placeholder="e.g. ssh.example.com">
        </div>

        <div class="col-md-6">
            <label class="form-label">SSH Port</label>
            <input class="form-control"
               name="ssh_port"
               placeholder="22"
               value="22"
               title="Default port: 22">
        </div>
    </div>

    <div class="row g-3 mt-1">
        <div class="col-md-6">
            <label class="form-label">SSH User
            <span class="text-danger">*</span>
            </label>
            <input class="form-control" 
                   name="ssh_user"
                   placeholder="SSH user">
        </div>

        <div class="col-md-6">
            <label class="form-label">SSH Password
            <span class="text-danger">*</span>
            </label>

            <div class="position-relative">
                <input type="password"
                       name="ssh_password"
                       class="form-control pe-5 password-field"
                       placeholder="SSH password">

                <i class="bi bi-eye-slash toggle-password"
                   style="position:absolute; top:50%; right:12px; transform:translateY(-50%); cursor:pointer;">
                </i>
            </div>
        </div>
    </div>
</div>

<button class="btn btn-primary w-100 mt-4 py-2 fw-semibold" id="connectBtn" type="submit">
    Connect to Database
</button>

</form>

</div>
</div>

<script src="../js/new_connection.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
