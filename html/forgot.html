<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | AskSQL</title>
    <link rel="icon" type="image/svg+xml" href="../images/database-fill.svg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">  
    <link rel="stylesheet" href="../css/forgot.css">

</head>
<body class="d-flex align-items-center justify-content-center vh-100 page-bg">


<!-- CONTAINER -->
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
                <div class="card p-4 border-0 custom-card">  
        
                    <div class="text-center mb-3">
                           <i class="bi bi-database-fill app-icon"></i>
                    </div>

                <!-- TITLE -->
                <h4 class="text-center mb-2">Forgot Password</h4>

                <!-- SUBTEXT -->
                <p class="text-muted text-center small">
                    Enter your email and we will send you a reset link.
                </p>

                <!-- MESSAGE -->
                <div id="messageBox"></div>

                <!-- FORM -->
                <form id="forgotForm">
                    <div class="mb-3 text-start">
                        <label class="form-label">Email
                            <span class="text-danger">*</span>
                        </label>
                    
                        <div class="position-relative">
                            <i class="bi bi-envelope input-icon position-absolute"></i>
                            <input 
                                 type="email" 
                                 id="email" 
                                 class="form-control ps-5"
                                 placeholder="Enter your email"
                                 data-bs-toggle="tooltip"
                                 title="Enter the email linked to your account"
                                 required
                            >
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-send me-1"></i>
                        Send Reset Link
                    </button>

                </form>

                <!-- BACK -->
                <div class="text-center mt-3">
                    <a href="login.html" class="text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>
                        Back to login
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/forgot.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
