<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | AskSQL</title>
    <link rel="icon" type="image/svg+xml" href="../images/database-fill.svg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/global.css">  
    <link rel="stylesheet" href="../css/reset_password.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 page-bg">

     <div class="container">
        <div class="row justify-content-center">
    
            <div class="col-md-5 col-lg-4">
    
              <div class="card shadow p-4 border-0 reset-card">

                    <h4 class="text-center mb-3">Reset Password</h4>
    
                    <p class="text-muted text-center small">
                        Enter your new password.
                    </p>
    
                    <!-- MESSAGE -->
                    <div id="messageBox">
                        <!-- JS -->
                    </div>
    
                    <!-- FORM -->
                    <form id="resetForm">
                         <!-- New Password -->
                         <div class="mb-3 text-start">
                            <label class="form-label">New Password
                                <span class="text-danger">*</span>
                            </label>

                             <div class="position-relative">
                                 <i class="bi bi-lock position-absolute"
                                    style="top:50%; transform:translateY(-50%); left:12px; color:#6c757d;"></i>

                                   <input 
                                     type="password" 
                                     id="password1" 
                                     class="form-control ps-5 pe-5 password-field"
                                     placeholder="Enter new password"
                                     required
                                     >

                                   <i class="bi bi-eye-slash toggle-password"
                                      data-bs-toggle="tooltip"
                                      title="Show / hide password"
                                      style="position:absolute; top:50%; right:12px; transform:translateY(-50%); cursor:pointer;">
                                   </i>
    
                                </div>
                         </div>

                              <!-- Confirm Password -->
                           <div class="mb-3 text-start">
                              <label class="form-label">Confirm Password
                                <span class="text-danger">*</span>
                              </label>
                                 <div class="position-relative">
                                     <i class="bi bi-lock position-absolute"
                                        style="top:50%; transform:translateY(-50%); left:12px; color:#6c757d;"></i>

                                      <input 
                                         type="password" 
                                         id="password2" 
                                         class="form-control ps-5 pe-5 password-field"
                                         placeholder="Confirm password"
                                         required
                                        >

                                       <i class="bi bi-eye-slash toggle-password"
                                          data-bs-toggle="tooltip"
                                          title="Show / hide password"
                                          style="position:absolute; top:50%; right:12px; transform:translateY(-50%); cursor:pointer;">
                                       </i>
                                 </div>
                           </div>
    
                        <button type="submit" class="btn btn-primary w-100">
                            Reset Password
                        </button>
    
                    </form>
    
                    <div class="text-center mt-3">
                        <a href="login.html" class="text-decoration-none">
                            ← Back to login
                        </a>
                    </div>
    
                </div>
    
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/reset_password.js"></script>
<script src="../js/auth.js"></script>
</body>
</body>
</html>
