<html>
<head>
    <meta charset="UTF-8">
    <title>Profile | AskSQL </title>
    <link rel="icon" type="image/svg+xml" href="../images/database-fill.svg">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/global.css">  
    <link rel="stylesheet" href="../css/profile.css">

    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', redirectToLoginIfUnauthenticated);
    </script>


</head>
<body class="d-flex flex-column min-vh-100">


<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">

  <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
    <span class="navbar-title">AskSQL</span>

</a>

    <!-- Hamburger -->
    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMenu">

      <span class="navbar-toggler-icon"></span>

    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse justify-content-end"
         id="navbarMenu">

     <div class="mobile-user-info d-lg-none">
                <i class="bi bi-person-fill"></i>
               <div class="user-meta">
                 <small>Signed in as</small>
                 <span id="navbarUsername">User</span>
               </div>
            </div>


      <div class="navbar-nav align-items-lg-center gap-lg-3">
                <a href="connections.html"
                   class="nav-link text-light">
                    <i class="bi bi-database-fill-gear me-1"></i>
                    Connections
                </a>

                  <a
                    class="nav-link nav-link-about"
                    href="dashboard.html">
                    <i class="bi bi-house me-1"></i>
                    Dashboard
                </a>

                <a
                    class="nav-link"
                    href="#"
                    onclick="openProfile()">

                    <i class="bi bi-person-circle me-1"></i>
                    Profile
                </a>

                <a
                    class="nav-link nav-link-about"
                    href="about.html">

                    <i class="bi bi-info-circle me-1"></i>
                    About
                </a>

                <a
                    class="nav-link text-warning"
                    href="#"
                    onclick="openSUSModal()">

                    <i class="bi bi-star-fill me-1"></i>
                    Rate Us
                </a>

                <a
                    class="nav-link text-danger"
                    href="#"
                    onclick="logout()">

                    <i class="bi bi-box-arrow-right me-1"></i>
                    Logout
                </a>


      </div>

    </div>

  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5 mb-5 profile-container">


<div class="card p-5 border-0 bg-white">

<h3 class="section-title">Profile settings</h3>


<!-- INFO -->
<div class="profile-row">
    <span class="profile-label">
        <i class="bi bi-person me-1"></i> USERNAME
    </span>

    <span id="Username" class="profile-value"></span>
</div>


<div class="profile-row">
    <span class="profile-label">
        <i class="bi bi-envelope me-1"></i> EMAIL
    </span>

    <span id="Email" class="profile-value"></span>
</div>

<div class="profile-row">
    <span class="profile-label">
        <i class="bi bi-shield-lock me-1"></i> ROLE
    </span>

    <span id="Role" class="profile-value"></span>
</div>

<div class="profile-row">
    <span class="profile-label">
        <i class="bi bi-calendar me-1"></i> CREATED AT
    </span>

    <span id="Created" class="profile-value"></span>
</div>

<div class="section-divider"></div>

<div id="messageBox" class="mb-2"></div>

<h5 class="password-title">Change Password</h5>

<form id="settingsForm">

<!-- NEW PASSWORD -->
<div class="mb-3 text-start">
    <label class="form-label">New password</label>

    <div class="position-relative">
        <input type="password"
               name="new_password"
               class="form-control pe-5 password-field"
               id="password1"
               required>

        <i class="bi bi-eye-slash toggle-password password-toggle"
           data-bs-toggle="tooltip"
           title="Show / hide password"></i>
    </div>
</div>

<!-- CONFIRM -->
<div class="mb-3 text-start">
    <label class="form-label">Confirm password</label>

    <div class="position-relative">
        <input type="password"
               name="confirm_password"
               class="form-control pe-5 password-field"
               id="password2"
               required>

        <i class="bi bi-eye-slash toggle-password password-toggle"
           data-bs-toggle="tooltip"
           title="Show / hide password"></i>
    </div>
</div>

<div class="text-center mt-4">
    <button type="submit" id="ChangeBtn" class="btn btn-primary px-5">
        Change Password
    </button>
</div>

</form>

</div>
</div>

<script src="../js/profile.js"></script>

</body>
</html>
